<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Gains - Training</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&family=Space+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0a0a0a;
  --white:#f5f2eb;
  --orange:#ff5c00;
  --gray:#1e1e1e;
  --gray2:#2a2a2a;
  --muted:#777;
}

body {
  margin:0;
  background:var(--black);
  color:var(--white);
  font-family:DM Sans;
}

nav {
  position:fixed;
  top:0; left:0; right:0;
  height:56px;
  background:#0a0a0aee;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #222;
}

.nav-logo {
  font-family:"Bebas Neue";
  color:var(--orange);
  letter-spacing:2px;
}

.nav-links a {
  color:var(--muted);
  margin-left:12px;
  text-decoration:none;
  font-size:12px;
}

.container {
  max-width:900px;
  margin:100px auto;
  padding:0 20px;
}

h1 {
  font-family:"Bebas Neue";
  font-size:48px;
  color:var(--orange);
}

button {
  cursor:pointer;
}

/* WORKOUT CARDS */
.card {
  background:var(--gray);
  padding:16px;
  margin-bottom:10px;
}

/* MODALS */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:999;
  padding:20px;
}

.modal-box {
  max-width:500px;
  margin:auto;
  background:var(--gray);
  padding:20px;
}

.btn {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
}

.orange { background:var(--orange); color:black; font-weight:bold; }

.gray { background:#333; color:white; }

/* TIMER */
#timer {
  font-size:42px;
  margin:10px 0;
  font-family:"Bebas Neue";
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">BUILD DIFFERENT</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="fuel.html">Fuel</a>
    <button onclick="openWorkoutSelector()" class="gray btn" style="width:auto;padding:6px 10px;">Start</button>
  </div>
</nav>

<div class="container">
  <h1>TRAINING</h1>

  <div class="card">5 day split active • progressive overload • 60 min sessions</div>
</div>

<!-- SELECT WORKOUT -->
<div class="modal" id="selector">
  <div class="modal-box">
    <h2 style="color:var(--orange);font-family:Bebas Neue;">START WORKOUT</h2>

    <select id="day">
      <option value="0">Monday Chest</option>
      <option value="1">Tuesday Back</option>
      <option value="3">Thursday Legs</option>
      <option value="4">Friday Chest Pump</option>
      <option value="5">Saturday Arms</option>
    </select>

    <button class="btn orange" onclick="startWorkout()">Begin</button>
    <button class="btn gray" onclick="closeSelector()">Cancel</button>
  </div>
</div>

<!-- ACTIVE WORKOUT -->
<div class="modal" id="active">
  <div class="modal-box">
    <h2 style="font-family:Bebas Neue;color:var(--orange);">WORKOUT ACTIVE</h2>

    <div id="timer">60:00</div>
    <div id="title"></div>

    <div id="list"></div>

    <button class="btn orange" onclick="endWorkout()">Finish</button>
  </div>
</div>

<script>

let timer;
let time = 60 * 60;

const workouts = {
  0:["DB Bench","Incline DB Press","Fly","Dips","Skull Crushers"],
  1:["Barbell Row","Lat Pulldown","Cable Row","Face Pulls","DB Curl"],
  3:["Squat","RDL","Leg Press","Leg Curl","Calves"],
  4:["Incline Press","DB Press","Cable Fly","Cable Curl","Pushdowns"],
  5:["Barbell Curl","Hammer Curl","Preacher Curl","Skull Crushers","Hanging Leg Raise"]
};

function openWorkoutSelector(){
  document.getElementById("selector").style.display="block";
}

function closeSelector(){
  document.getElementById("selector").style.display="none";
}

function startWorkout(){
  let d = document.getElementById("day").value;
  let list = workouts[d];

  document.getElementById("selector").style.display="none";
  document.getElementById("active").style.display="block";

  document.getElementById("title").innerText =
    document.getElementById("day").options[d].text;

  let container = document.getElementById("list");
  container.innerHTML="";

  list.forEach(x=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML="⬜ " + x;

    div.onclick=()=>{
      div.innerHTML = div.innerHTML.includes("⬜") ? "✅ "+x : "⬜ "+x;
    };

    container.appendChild(div);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);

  timer=setInterval(()=>{
    time--;

    let m=Math.floor(time/60);
    let s=time%60;

    document.getElementById("timer").innerText =
      `${m}:${s.toString().padStart(2,"0")}`;

    if(time<=0){
      clearInterval(timer);
      alert("Done");
    }
  },1000);
}

function endWorkout(){
  clearInterval(timer);
  document.getElementById("active").style.display="none";
  time=60*60;
}

</script>

</body>
</html>
